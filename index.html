<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina de Cadastro</title>
    <meta name="description" content="Site sobre HTML">
    <meta name="keywords" content="html, java, css, programacao">
    <meta name="author" content="Tomas">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="processo_login">
            <div class="titulo_login">
                <h2>Faça login como desenvolvedor</h2>
            </div>
            <div class="botoes_sites">
                <div class="facebook_buttom">
                    <a href="#">
                        <i class="fa-brands fa-facebook-f"></i>
                    </a>
                </div>
                <div class="gmail_buttom">
                    <a href="#">
                        <i class="fa-brands fa-google-plus-g"></i>
                    </a>
                </div>
                <div class="linkedin_buttom">
                    <a href="#">
                        <i class="fa-brands fa-linkedin-in"></i>
                    </a>
                </div>
            </div>
            <div class="mensagem">ou use sua conta de email:</div>
            <div class="container_inputs">
                <div class="email">
                    <input type="email" placeholder="Email">
                    <i class="fa-regular fa-envelope"></i>
                </div>
                <div class="senha">
                    <input type="password" placeholder="Senha">
                    <i class="fa-solid fa-lock"></i>
                </div>
            </div>
            <div class="container2">
                <div class="checkbox_salvar_senha">
                    <label>
                        <input type="checkbox">
                        Permanecer conectado.
                    </label>
                </div>

                <div class="esqueceu_senha">
                    <a href="#">Esqueceu sua senha?</a>
                </div>
            </div>
            <div class="botao_fazer_login">
                <button>Fazer Login</button>
            </div>
            <p class="ou">ou</p>
            <div class="criar_conta">
                <a href="#">Quero criar uma conta</a>
            </div>
        </div>

        <div class="aviso_entrar_conta">
            <h2>Olá Desenvolvedor,</h2>
            <p>Entre com seus dados pessoais <br> e inicie a jornada conosco!</p>

            <button>Inscrever-se</button>
        </div>
    </div>
</body>

</html>
